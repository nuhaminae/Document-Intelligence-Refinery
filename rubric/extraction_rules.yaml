# Extraction Rules & Thresholds
# Externalised configuration for the Document Intelligence Refinery

version: "1.2"

thresholds:
  # Character density thresholds (chars / page area)
  char_density:
    high: 0.001   # FastText candidate
    medium_low: 0.0005   # Layout-aware candidate
    low: 0.0003   # Vision candidate

  # Whitespace ratio thresholds (whitespace area / page area)
  whitespace_ratio:
    low: 0.5      # FastText candidate
    medium: 0.6   # Layout-aware candidate
    high: 0.7     # Vision candidate

  # Image area ratio thresholds (image area / page area)
  image_area_ratio:
    max_fasttext: 0.3   # If > 30%, escalate to Vision

  # Max LDUs per page threshold
  max_ldus_per_page: 1000   # fewer page group splits
  min_section_length: 20    # merge short paragraphs
  max_list_items: 200       # keep lists intact unless very long

confidence_scoring:
  fasttext:
    min_chars_per_page: 100
    max_image_area_ratio: 0.5
    required_font_metadata: true
  layout:
    min_table_detection_confidence: 0.7
    min_multi_column_confidence: 0.7
  vision:
    triggers:
      - scanned_image
      - handwriting_detected
      - low_confidence_from_A_or_B

chunking_rules:
  # Constitution for Logical Document Units (LDUs)
  - rule: "Table cells must never be split from their header row."
  - rule: "Figure captions must always be stored as metadata of their parent figure."
  - rule: "Numbered lists must remain intact unless exceeding max_tokens."
  - rule: "Section headers must be stored as parent metadata for all child chunks."
  - rule: "Cross-references (e.g., 'see Table 3') must be resolved and stored as chunk relationships."
  # Additional rules
  - rule: "Footnotes and endnotes must be linked to their reference text."
  - rule: "Equations must be stored atomically with LaTeX metadata."
  - rule: "Multi-page tables and figures must preserve continuity across pages."
  - rule: "Semantic hierarchy must be enforced: sections → subsections → paragraphs."

budget_guard:
  max_cost_per_document_usd: 0.50
  escalation_policy: "Escalate from FastText → LayoutAware → Vision only if confidence < threshold."
